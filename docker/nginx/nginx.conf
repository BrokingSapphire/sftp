upstream sftp_backend  { server backend:8080; }
upstream sftp_frontend { server frontend:3000; }

# Redirect HTTP → HTTPS in production (uncomment once certs are mounted).
# server {
#   listen 80;
#   server_name _;
#   return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;
    server_name _;

    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;

    # No cap on upload size — the backend enforces per-user quota / max size.
    client_max_body_size 0;
    client_body_timeout  3600s;
    send_timeout         3600s;

    # Security headers (backend also sets these; belt and suspenders).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── API + public share links → Go backend ──
    location /api/ {
        proxy_pass http://sftp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream large uploads/downloads without buffering to disk.
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Everything else → Next.js frontend ──
    location / {
        proxy_pass http://sftp_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
