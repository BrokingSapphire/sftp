# Full-stack, production-style deployment: Postgres + backend + frontend + Nginx.
# Bring it all up:  docker compose up -d --build
# (For backend-only dev, use backend/docker-compose.yml.)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sftp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sftp}
      POSTGRES_DB: ${POSTGRES_DB:-sftp}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sftp}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "2222:2222"   # native SFTP-over-SSH endpoint
    environment:
      CONFIG_FILE: /app/config.yaml
      APP_ENVIRONMENT: production
      APP_SELF_BASE_URL: ${PUBLIC_URL:-http://localhost}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sftp}:${POSTGRES_PASSWORD:-sftp}@postgres:5432/${POSTGRES_DB:-sftp}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (min 32 chars)}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_OLLAMA_URL: ${AI_OLLAMA_URL:-}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_URL:-http://localhost}
      # Leave empty to let brand.config.json drive org domains (env still overrides).
      ORG_DOMAINS: ${ORG_DOMAINS:-}
      STORAGE_ROOT_PATH: /app/storage/files
      STORAGE_TEMP_PATH: /app/storage/tmp
      # Uncomment to encrypt file content at rest (openssl rand -hex 32):
      # STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
    volumes:
      - sftp-files:/app/storage/files
      - sftp-tmp:/app/storage/tmp
      - sftp-logs:/app/storage/logs
      # Canonical white-label config, shared with the frontend.
      - ./brand.config.json:/app/brand.config.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      # Repo root so the canonical brand.config.json is in the build context.
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # SSR/rewrites talk to the backend over the internal network.
      NEXT_PUBLIC_API_BASE_URL: http://backend:8080
    depends_on:
      - backend

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # enable after adding TLS certs (see docker/nginx/Dockerfile)
    depends_on:
      - backend
      - frontend

  # Optional on-prem AI backend. Off by default — start with:
  #   docker compose --profile ai up -d
  # then pull the models once:
  #   docker compose exec ollama ollama pull nomic-embed-text
  #   docker compose exec ollama ollama pull llama3.1
  # and set ai.enabled=true in brand.config.json (deploy.sh can do this for you).
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["ai"]
    volumes:
      - ollama-data:/root/.ollama

  # Optional live Office editing. Off by default — start with:
  #   docker compose --profile office up -d
  # Set editor.enabled=true + editor.jwtSecret in brand.config.json (deploy.sh
  # can do this) and point editor.docServerUrl at this server's public URL.
  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    profiles: ["office"]
    ports:
      - "8082:80"   # browser loads the editor from here (editor.docServerUrl)
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${EDITOR_JWT_SECRET:-}
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data

volumes:
  postgres-data:
  sftp-files:
  sftp-tmp:
  sftp-logs:
  ollama-data:
  onlyoffice-data:
