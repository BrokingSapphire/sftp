# Full-stack, production-style deployment: Postgres + backend + frontend + Nginx.
# Bring it all up:  docker compose up -d --build
# (For backend-only dev, use backend/docker-compose.yml.)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sftp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sftp}
      POSTGRES_DB: ${POSTGRES_DB:-sftp}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sftp}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "2222:2222"   # native SFTP-over-SSH endpoint
    environment:
      CONFIG_FILE: /app/config.yaml
      APP_ENVIRONMENT: production
      APP_SELF_BASE_URL: ${PUBLIC_URL:-http://localhost}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sftp}:${POSTGRES_PASSWORD:-sftp}@postgres:5432/${POSTGRES_DB:-sftp}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (min 32 chars)}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_URL:-http://localhost}
      # Leave empty to let brand.config.json drive org domains (env still overrides).
      ORG_DOMAINS: ${ORG_DOMAINS:-}
      STORAGE_ROOT_PATH: /app/storage/files
      STORAGE_TEMP_PATH: /app/storage/tmp
      # Uncomment to encrypt file content at rest (openssl rand -hex 32):
      # STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
    volumes:
      - sftp-files:/app/storage/files
      - sftp-tmp:/app/storage/tmp
      - sftp-logs:/app/storage/logs
      # Canonical white-label config, shared with the frontend.
      - ./brand.config.json:/app/brand.config.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      # Repo root so the canonical brand.config.json is in the build context.
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # SSR/rewrites talk to the backend over the internal network.
      NEXT_PUBLIC_API_BASE_URL: http://backend:8080
    depends_on:
      - backend

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # enable after adding TLS certs (see docker/nginx/Dockerfile)
    depends_on:
      - backend
      - frontend

volumes:
  postgres-data:
  sftp-files:
  sftp-tmp:
  sftp-logs:
