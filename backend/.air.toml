root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  full_bin = ""
  include_ext = ["go", "yaml", "sql"]
  exclude_dir = ["bin", "tmp", "storage", "internal/db/sftpdb"]
  exclude_regex = ["_test.go"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
