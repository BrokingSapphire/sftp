# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

# Migration management via goose. DATABASE_URL is read from the env file.
tasks:
  migrate:
    desc: Apply all pending migrations
    aliases: [up]
    dotenv: ['{{.ENV_FILE}}']
    cmds:
      - go run github.com/pressly/goose/v3/cmd/goose@latest -dir {{.MIGRATIONS_DIR}} postgres "$DATABASE_URL" up

  rollback:
    desc: Roll back the most recent migration
    aliases: [down]
    dotenv: ['{{.ENV_FILE}}']
    cmds:
      - go run github.com/pressly/goose/v3/cmd/goose@latest -dir {{.MIGRATIONS_DIR}} postgres "$DATABASE_URL" down

  status:
    desc: Show migration status
    dotenv: ['{{.ENV_FILE}}']
    cmds:
      - go run github.com/pressly/goose/v3/cmd/goose@latest -dir {{.MIGRATIONS_DIR}} postgres "$DATABASE_URL" status

  create:
    desc: 'Create a new migration (usage: task db:create -- add_widgets)'
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: 'Migration name required. Usage: task db:create -- add_widgets_table'
    cmds:
      - go run github.com/pressly/goose/v3/cmd/goose@latest -dir {{.MIGRATIONS_DIR}} create {{.CLI_ARGS}} sql

  reset:
    desc: Roll back all migrations then re-apply
    dotenv: ['{{.ENV_FILE}}']
    prompt: This drops and recreates all tables. Continue?
    cmds:
      - go run github.com/pressly/goose/v3/cmd/goose@latest -dir {{.MIGRATIONS_DIR}} postgres "$DATABASE_URL" reset
      - task: migrate
