version: "2"
sql:
  - engine: postgresql
    queries: internal/db/queries
    schema: migrations/sftp
    gen:
      go:
        package: sftpdb
        out: internal/db/sftpdb
        sql_package: pgx/v5
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        emit_json_tags: true
        json_tags_case_style: snake
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
